<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介</title>
    <style>
        /* 共通設定 */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #000;
        }
        .hidden { display: none !important; }

        /* Scene 1: デカデカ自己紹介 */
        #scene-intro {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            font-size: 15vw;
            margin: 0;
            letter-spacing: 5px;
        }
        #start-btn {
            margin-top: 40px;
            font-size: 24px;
            padding: 15px 40px;
            cursor: pointer;
            border: 2px solid #000;
            background: #fff;
            transition: 0.2s;
        }
        #start-btn:hover {
            background: #000;
            color: #fff;
        }
        .warning-text {
            margin-top: 40px;
            text-align: center;
        }
        .warning-text p {
            margin: 5px 0;
        }
        .warning-text .big-red {
            font-size: 1.6rem;
            font-weight: bold;
            color: #e60000;
        }
        .warning-text .small-gray {
            font-size: 14px;
            color: #666;
            margin-top: 15px;
        }

        /* Scene 2: You are an idiot パロディ */
        .flash-bg {
            animation: flash 0.1s infinite;
        }
        @keyframes flash {
            0% { background-color: white; color: black; }
            50% { background-color: black; color: white; }
            100% { background-color: white; color: black; }
        }
        #idiot-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
        }
        .idiot-box {
            position: absolute;
            width: 250px;
            height: 100px;
            background: #fff;
            color: #000;
            border: 5px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            animation: bounceX 2.5s infinite alternate linear, bounceY 3.2s infinite alternate linear;
        }
        @keyframes bounceX {
            0% { left: 0; }
            100% { left: calc(100vw - 260px); }
        }
        @keyframes bounceY {
            0% { top: 0; }
            100% { top: calc(100vh - 110px); }
        }

        /* QRコード・はずれ用 共通ポップアップ設定 */
        .custom-popup {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }
        .popup-box {
            background: white;
            padding: 30px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        .popup-box p {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
            line-height: 1.5;
        }
        .popup-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .popup-buttons button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Scene 3: CAPTCHA */
        #scene-captcha {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(0,0,0,0.8);
        }
        .captcha-modal {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .captcha-header {
            background: #1a73e8;
            color: white;
            padding: 15px;
            font-size: 18px;
            text-align: left;
            margin-bottom: 15px;
        }
        .captcha-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .captcha-box {
            width: 100%;
            aspect-ratio: 1;
            background: #e0e0e0;
            cursor: pointer;
            transition: 0.2s;
        }
        .captcha-box.selected {
            background: #1a73e8;
            transform: scale(0.9);
        }
        #verify-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            float: right;
            border-radius: 3px;
        }

        /* Scene 4: エンドロール */
        #scene-endroll {
            height: 100vh;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            position: relative;
        }
        .credits {
            position: absolute;
            bottom: -100%;
            text-align: center;
            width: 100%;
            animation: scrollUp 25s linear forwards;
        }
